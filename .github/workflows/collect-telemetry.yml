name: PUBG 텔레메트리 자동 수집

on:
  schedule:
    - cron: "0 18 * * *"   # UTC 18:00 = KST 03:00
  workflow_dispatch:        # 수동 실행 버튼

jobs:
  collect:
    runs-on: ubuntu-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 의존성 설치
        run: pip install -r backend/requirements.txt httpx schedule

      - name: DB 캐시 복원 (이전 수집 데이터 이어받기)
        uses: actions/cache@v4
        with:
          path: backend/pubg_positions.db
          key: pubg-db-persistent
          restore-keys: pubg-db-persistent

      - name: won 오염 데이터 초기화 (final_rank 없는 폴백 항목만)
        run: |
          python - <<'EOF'
          import sqlite3, os
          db_path = "backend/pubg_positions.db"
          if os.path.exists(db_path):
              conn = sqlite3.connect(db_path)
              cur = conn.cursor()
              cur.execute("UPDATE positions SET won = 0 WHERE final_rank IS NULL")
              print(f"초기화된 행: {cur.rowcount}")
              conn.commit()
              conn.close()
          else:
              print("DB 없음, 스킵")
          EOF

      - name: 텔레메트리 수집 실행
        working-directory: scripts
        env:
          PUBG_API_KEY: ${{ secrets.PUBG_API_KEY }}
        run: |
          python collect_telemetry.py \
            --names "${{ secrets.PLAYER_NAMES }}" \
            --matches 5

      - name: DB 캐시 저장
        uses: actions/cache/save@v4
        if: always()
        with:
          path: backend/pubg_positions.db
          key: pubg-db-persistent

      - name: DB 파일 artifact 저장
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pubg-db-${{ github.run_number }}
          path: backend/pubg_positions.db
          retention-days: 30
